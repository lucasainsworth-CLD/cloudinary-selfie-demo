<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload a selfie</title>
    <link rel="stylesheet" href="css/mobile.css" />
  </head>
  <body>
    <div class="page">
      <h1>Upload your selfie</h1>
      <p class="lead">Pick camera or library, preview, then upload. It appears on the live wall shortly.</p>
      <button type="button" class="btn" id="open-upload">Take or choose selfie</button>
      <input type="file" id="photo-input-library" accept="image/*" hidden aria-hidden="true" />
      <input
        type="file"
        id="photo-input-camera"
        accept="image/*"
        capture="user"
        hidden
        aria-hidden="true"
      />

      <div class="preview-panel" id="preview-panel" hidden>
        <p class="preview-heading">Preview</p>
        <div class="preview-frame">
          <img id="preview-img" width="400" height="400" alt="Your selected photo" />
        </div>
        <p class="preview-filename" id="preview-filename"></p>
        <div class="preview-actions">
          <button type="button" class="btn" id="preview-upload">Upload to wall</button>
          <button type="button" class="btn btn-secondary" id="preview-cancel">Choose different photo</button>
        </div>
      </div>

      <div class="toast" id="toast" hidden>Uploaded — check the big screen.</div>
      <div class="err" id="err" hidden></div>
      <p class="footer">Powered by Cloudinary</p>
    </div>

    <div class="source-sheet" id="source-sheet" hidden>
      <div class="source-sheet-backdrop" id="source-sheet-backdrop" aria-hidden="true"></div>
      <div
        class="source-sheet-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="source-sheet-title"
      >
        <p class="source-sheet-title" id="source-sheet-title">Add a photo</p>
        <button type="button" class="btn" id="pick-camera">Take photo</button>
        <button type="button" class="btn btn-secondary" id="pick-library">Photo library</button>
        <button type="button" class="source-sheet-cancel" id="source-sheet-cancel">Cancel</button>
      </div>
    </div>

    <script src="js/site-config.js"></script>
    <script src="js/mobile.js"></script>
  </body>
</html>
