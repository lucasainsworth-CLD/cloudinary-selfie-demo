<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload a selfie</title>
    <link rel="stylesheet" href="css/mobile.css" />
  </head>
  <body>
    <div class="page">
      <h1>Upload your selfie</h1>
      <p class="lead">Opens your camera or photo library. Your image appears on the live wall shortly.</p>
      <button type="button" class="btn" id="open-upload">Take or choose photo</button>
      <div class="toast" id="toast" hidden>Uploaded — check the big screen.</div>
      <div class="err" id="err" hidden></div>
      <p class="footer">Powered by Cloudinary</p>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="js/site-config.js"></script>
    <script src="js/mobile.js"></script>
  </body>
</html>
